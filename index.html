<!doctype html>
<html lang="en-US" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World e-Travel Explorer - Discover Any Country Homepage</title>
    <meta name="description"
        content="Explore any country in the world — flag, capital, weather, currency, and more in one place. Your all-in-one travel research companion.">
    <meta name="author" content="Leilany Dumlao">

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="World e-Travel Explorer">
    <meta property="og:description"
        content="Discover any country before you travel. One destination for every destination.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ldumlao1204.github.io/WDD330-Final-Project/">
    <meta property="og:locale" content="en_US">
    <meta property="og:image" content="https://ldumlao1204.github.io/WDD330-Final-Project/images/desktop-view.webp">
    <meta property="og:site_name" content="World e-Travel Explorer">

    <!-- Favicon -->
    <link rel="icon" href="images/favicon.ico">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">

    <!-- CSS Files -->
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/project-main.css">
    <link rel="stylesheet" href="styles/project-medium.css">
    <link rel="stylesheet" href="styles/project-large.css">

    <!-- Scripts -->
    <script src="scripts/getdates.js" defer></script>
    <script src="scripts/main.js" type="module"></script>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header>
        <a href="index.html" class="logo-link">
            <img src="images/world-travel-explorer.webp" alt="World e-Travel Explorer logo"
                class="logo" width="48" height="48">
        </a>
        <span class="site-name">World eTravel Explorer</span>

        <nav id="main-nav" aria-label="Main navigation">
            <ul class="navigation">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="country.html">Country</a></li>
                <li><a href="favorites.html">Favorites</a></li>
            </ul>
        </nav>

        <button id="theme-toggle" class="theme-btn" aria-label="Switch to dark mode">🌙</button>
        <button id="ham-btn" class="hamburger" aria-label="Toggle navigation menu" aria-expanded="false">&#9776;</button>
    </header>

    <main>

        <!-- ===== HERO SECTION ===== -->
        <section class="hero">
            <div class="hero-content">
                <h1>Explore the World,<br>One Journey at a Time</h1>
                <p>Discover any country — flag, capital, weather, currency, and more in one place.</p>
                <a href="#search-section" class="cta-button">Start Exploring</a>
            </div>
        </section>

        <!-- ===== SEARCH & FILTER SECTION ===== -->
        <div id="search-section" class="search-section">
            <div class="search-container">
                <label for="country-search" class="sr-only">Search for a country</label>
                <input
                    type="search"
                    id="country-search"
                    class="search-input"
                    placeholder="Search for a country..."
                    list="country-list"
                    autocomplete="off">
                <button id="search-btn" class="search-btn" aria-label="Search">🔍</button>
            </div>
            <datalist id="country-list"></datalist>
            <div class="region-filters" role="group" aria-label="Filter by region">
                <button class="region-btn active" data-region="all">All</button>
                <button class="region-btn" data-region="Africa">Africa</button>
                <button class="region-btn" data-region="Asia">Asia</button>
                <button class="region-btn" data-region="Europe">Europe</button>
                <button class="region-btn" data-region="Americas">Americas</button>
                <button class="region-btn" data-region="Oceania">Oceania</button>
                <button class="region-btn" data-region="Antarctic">Antarctic</button>
            </div>
        </div>

        <!-- ===== COUNTRY CARDS GRID ===== -->
        <div class="countries-section">
            <div id="country-grid" class="country-grid">
                <p class="loading-msg">Loading countries... 🌍</p>
            </div>
        </div>

    </main>

    <!-- ===== FOOTER ===== -->
        <footer>
        <div class="footer-container">
            <div class="social-links">
                <a href="https://www.facebook.com" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
                    <img src="images/facebook.svg" alt="Facebook" width="24" height="24">
                </a>
                <a href="https://www.twitter.com" target="_blank" rel="noopener noreferrer" aria-label="Twitter">
                    <img src="images/twitter.svg" alt="Twitter" width="24" height="24">
                </a>
                <a href="https://www.linkedin.com" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
                    <img src="images/linkedin.svg" alt="LinkedIn" width="24" height="24">
                </a>
                <a href="https://github.com/ldumlao1204" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
                    <img src="images/github.svg" alt="GitHub" width="24" height="24">
                </a>
            </div>
            <p>&copy; <span id="currentyear"></span> World eTravel Explorer</p>
            <p>Last Modified: <span id="last-modified"></span></p>
        </div>
    </footer>
    <!-- Country Card Template — hidden blueprint used by JavaScript -->
    <template id="country-card-template">
        <div class="country-card">
            <img class="card-flag" src="" alt="" loading="lazy" width="300" height="155">
            <div class="card-body">
                <h2 class="card-name"></h2>
                <p><strong>Capital:</strong> <span class="card-capital"></span></p>
                <p><strong>Region:</strong> <span class="card-region"></span></p>
                <p><strong>Area:</strong> <span class="card-population"></span></p>
            </div>
            <div class="card-actions">
                <button class="view-btn">View Details</button>
                <button class="fav-btn" data-saved="false">&#9825; Save</button>
            </div>
        </div>
    </template>

</body>
</html>
